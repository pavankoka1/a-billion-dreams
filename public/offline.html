<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>A Billion Dreams — Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0a0a0f;
        color: #e4e4e7;
        font-family:
          ui-sans-serif,
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          Helvetica,
          Arial,
          sans-serif;
      }
      .card {
        width: min(92vw, 460px);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 16px;
        padding: 24px 22px;
        background: rgba(19, 19, 26, 0.9);
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
      }
      h1 {
        margin: 0 0 10px;
        font-size: 1.1rem;
        letter-spacing: 0.02em;
      }
      p {
        margin: 0;
        color: #a1a1aa;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <main class="card" role="main" aria-live="polite">
      <h1>A Billion Dreams is offline</h1>
      <p>
        Some parts of the experience are cached. Reconnect to load the full
        interactive particle story and latest assets.
      </p>
    </main>
  </body>
</html>
